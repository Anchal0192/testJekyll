<!DOCTYPE html>
<html>
<head>
  <title>{{ page.title }}</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
    }

    .sidebar {
      width: 220px;
      height: 100vh;
      background: #f4f4f4;
      padding: 20px;
      position: fixed;
    }

    .sidebar a {
      display: block;
      margin: 10px 0;
      color: #333;
      text-decoration: none;
    }

    .sidebar a:hover {
      font-weight: bold;
    }

    .content {
      margin-left: 240px;
      padding: 20px;
      flex: 1;
    }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Menu</h3>
    
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/about/' | relative_url }}">About</a>
    <a href="/contact">Contact</a>
  </div>

  <!-- Page content -->
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
